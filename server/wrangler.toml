name = "homecashflow-api"
main = "src/worker.js"
compatibility_date = "2024-12-01"

# Cron co 5 min: wyłączniki czasowe IR (±5 min — krok suwaka to i tak 30 min) +
# snapshot zużycia co 15 min (handler odpala energię tylko gdy minuta % 15 == 0).
[triggers]
crons = ["*/5 * * * *"]

[vars]
FRONTEND_URL = "https://homecashflow.org"
NEXTAUTH_URL = "https://api.homecashflow.org"
# Redirect URI OAuth SmartThings (jawne — nie sekret). Dev nadpisuje w .dev.vars na localhost.
SMARTTHINGS_REDIRECT_URI = "https://api.homecashflow.org/api/smartthings/callback"

# Secrets (set via `wrangler secret put`):
# - DATABASE_URL
# - NEXTAUTH_SECRET
# - FINANCE_DATA_KEY (32 B hex lub Base64 — szyfrowanie finance_data)
# - GOOGLE_CLIENT_ID
# - GOOGLE_CLIENT_SECRET
# - RESEND_API_KEY
# - SMARTTHINGS_CLIENT_ID      (z `smartthings apps:create` — jeden na całą apkę, NIE per user)
# - SMARTTHINGS_CLIENT_SECRET  (j.w. — tokeny per user idą do tabeli smartthings_credentials, nie tu)
# - WEATHER_GOOGLE_API_KEY      (Google Weather API — główne źródło pogody; brak/błąd → fallback Open-Meteo.
#                               Klucz MUSI mieć Application restrictions = None, bo Worker woła server-side bez referrera)
# - VAPID_PUBLIC_KEY            (Web Push — klucz publiczny base64url; `npx @pushforge/builder vapid`)
# - VAPID_PRIVATE_JWK           (Web Push — klucz prywatny JSON JWK z tego samego polecenia)
# - PUSH_ADMIN_CONTACT          (opcjonalnie mailto:… dla VAPID; domyślnie support@homecashflow.org)
